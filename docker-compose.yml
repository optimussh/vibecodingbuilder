services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: vibe-pgvector
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: vibe
      POSTGRES_PASSWORD: vibe
      POSTGRES_DB: vibe
    volumes:
      - vibe_pgdata:/var/lib/postgresql/data
      - ./deploy/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibe -d vibe"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Optional: run platform BFF in container (OpenCode still on host recommended on Windows)
  # platform:
  #   build:
  #     context: .
  #     dockerfile: deploy/Dockerfile.platform
  #   ports:
  #     - "3000:3000"
  #   env_file: .env
  #   environment:
  #     DATABASE_URL: postgres://vibe:vibe@postgres:5432/vibe
  #     OPENCODE_MANAGED: "false"
  #     OPENCODE_BASE_URL: http://host.docker.internal:4096
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   volumes:
  #     - ./data:/app/data

volumes:
  vibe_pgdata:
